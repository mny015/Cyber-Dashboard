{% extends "base.html" %}

{% block title %}Verify MFA - Cyber Dashboard{% endblock %}

{% block content %}
<h1>Verify MFA</h1>
<p>Enter the 6-digit code from your authenticator app.</p>

<form method="post">
    {{ form.hidden_tag() }}
    {{ form.token.label }}
    {{ form.token(placeholder="123456") }}
    {{ form.submit() }}
</form>
{% endblock %}
