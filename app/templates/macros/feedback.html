{% macro flash_messages() -%}
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="alert-stack" aria-live="polite">
            {% for category, message in messages %}
                <p class="alert {{ category }}" role="status">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
{%- endmacro %}
