{% extends "base.html" %}

{% block title %}{{ note.title }} | Cyber Dashboard{% endblock %}

{% block content %}
<section class="note-reader-shell">
    <header class="note-reader-header">
        <div>
            <p class="eyebrow">{{ note.topic_title or "No topic" }}</p>
            <h1>{{ note.title }}</h1>
            <p class="meta">Updated {{ note.updated_at|format_date }} · {{ note.body.split()|length }} words</p>
        </div>
        <div class="heading-actions">
            <a class="button button-secondary" href="{{ url_for('notes.index') }}">All notes</a>
            <a class="button" href="{{ url_for('notes.edit', note_id=note.id) }}">Edit</a>
            <form class="inline-form" method="post" action="{{ url_for('notes.delete', note_id=note.id) }}" data-confirm="Delete this note?">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button class="danger" type="submit">Delete</button>
            </form>
        </div>
    </header>

    <article class="note-reader-card">
        <div class="note-rendered" data-note-render>{{ note.body }}</div>
    </article>
</section>
{% endblock %}
