{% extends "base.html" %}

{% set editing = note and note.id %}
{% block title %}{{ "Edit" if editing else "New" }} Note - Cyber Dashboard{% endblock %}

{% block content %}
<h1>{{ "Edit" if editing else "New" }} Note</h1>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="title">Title</label>
    <input id="title" type="text" name="title" value="{{ note.title if note else '' }}" required>

    <label for="topic_id">Topic</label>
    <select id="topic_id" name="topic_id">
        <option value="">No topic</option>
        {% for topic in topics %}
            <option value="{{ topic.id }}" {% if note and note.topic_id == topic.id %}selected{% endif %}>{{ topic.title }}</option>
        {% endfor %}
    </select>

    <label for="body">Note</label>
    <textarea id="body" name="body" required>{{ note.body if note else '' }}</textarea>

    <button type="submit">Save note</button>
</form>

<a href="{{ url_for('notes.index') }}">Back to notes</a>
{% endblock %}
